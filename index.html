<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.png" type="image/x-icon">
</head>
<body>
    <section class="layout">
        <div class="header">
            <img class="logo" src="/images/favicon.png" alt="logo">
            <p class="logo_texto">Colorfly Studio</p>
        </div>
        <div class="main">
            <div class="botones">
                <h1>Creador de Paletas</h1>
                <p>Selecciona el tamaño de la paleta</p>
                <div class="seleccionador_tamaño">
                    <button>6</button>
                    <button>8</button>
                    <button>9</button>
                </div>
                <button>Crear paleta</button>
            </div>
            <img class="imagen_principal" src="images/imagen main.png" alt="imagen-principal">
        </div>



        <div class="footer">3</div>
    </section>
    <script src="index.js"></script>
</body>
</html>
